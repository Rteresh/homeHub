services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-homehub}
      POSTGRES_USER: ${POSTGRES_USER:-homehub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Задайте POSTGRES_PASSWORD в .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-homehub} -d ${POSTGRES_DB:-homehub}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_HOST: db
    command: ["/app/docker/entrypoint-web.sh"]
    ports:
      - "${SITE_PORT:-8001}:8000"
    volumes:
      - /srv/storage/homehub:/app/storage
    depends_on:
      db:
        condition: service_healthy

  bot:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_HOST: db
    command: ["/app/docker/entrypoint-bot.sh"]
    volumes:
      - /srv/storage/homehub:/app/storage
    depends_on:
      db:
        condition: service_healthy
      web:
        condition: service_started

volumes:
  postgres_data:
